# Hash Heist live leaderboard — Cloudflare Worker
# Deploy:  cd cloudflare/board && wrangler deploy
name = "hashheist-board"
main = "src/index.js"
compatibility_date = "2024-09-23"
workers_dev = true            # also gives you hashheist-board.<subdomain>.workers.dev for testing

# --- Custom domain: board.0byte.sh -------------------------------------------
# Requires the 0byte.sh zone to be on this Cloudflare account. wrangler creates
# the DNS record + route automatically when you deploy.
[[routes]]
pattern = "board.0byte.sh"
custom_domain = true

# --- KV: shared score state (replaces ctf/scores.json) -----------------------
# Create the namespace once, then paste its id here:
#   wrangler kv namespace create SCORES
[[kv_namespaces]]
binding = "SCORES"
id = "4eb2893692d8463c9e751a1dc968ee5c"

# ADMIN_TOKEN is NOT stored here — set it as a secret so it never lands in git:
#   wrangler secret put ADMIN_TOKEN
